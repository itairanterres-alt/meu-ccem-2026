  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; font-family: 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    body { background: #f3f6fc; overscroll-behavior: none; }

    .stage {
      min-height: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: #f3f6fc;
    }

    .device {
      width: 100%;
      max-width: 440px;
      min-height: 100svh;
      background: #f3f6fc;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    #root {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    /* Toast */
    .ccem-toast {
      position: fixed;
      bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(14px);
      background: #1a2438;
      color: #fff;
      padding: 9px 15px;
      border-radius: 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,.25);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      z-index: 500;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      max-width: 90vw;
    }
    .ccem-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Scrollbars */
    * { scrollbar-width: thin; scrollbar-color: #d5dff0 transparent; }
    *::-webkit-scrollbar { width: 3px; height: 3px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: #d5dff0; border-radius: 3px; }

    @keyframes ccem-bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-4px); }
    }

    /* Desktop */
    @media (min-width: 720px) {
      html, body { overflow: hidden; background: #f0f4fb; height: 100%; }
      .stage {
        min-height: 100vh;
        padding: 0;
        background: #f0f4fb;
        align-items: stretch;
        justify-content: stretch;
      }
      .device {
        width: 100%;
        max-width: 100%;
        min-height: 100vh;
        border-radius: 0;
        box-shadow: none;
        border: none;
      }
      .ccem-toast { bottom: 24px; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<!-- App Router v4 -->
<script type="text/babel" data-presets="react">
  function App() {
    const hash = useHashRoute();

    const route = useMemo(() => {
      const parts = (hash || '#/').replace(/^#\/?/, '').split('/').filter(Boolean);
      if (parts[0] === 'sessao'     && parts[1]) return { tela:'sessao', id:parts[1] };
      if (parts[0] === 'programa')               return { tela:'programa' };
      if (parts[0] === 'assistente')             return { tela:'assistente' };
      if (parts[0] === 'trabalhos')              return { tela:'trabalhos' };
      if (parts[0] === 'caderno')                return { tela:'caderno' };
      if (parts[0] === 'info')                   return { tela:'info' };
      return { tela:'home' };
    }, [hash]);

    const showShell = route.tela !== 'sessao' && route.tela !== 'home';

    return (
      <AppShell showShell={showShell} aba={route.tela}>
        {route.tela === 'sessao'     && <SessaoDetail id={route.id}/>}
        {route.tela === 'home'       && <HomeScreen/>}
        {route.tela === 'assistente' && <AssistenteScreen/>}
        {route.tela === 'trabalhos'  && <TrabalhosScreen/>}
        {route.tela === 'caderno'    && <CadernoScreen/>}
        {route.tela === 'info'       && <InfoScreen/>}
        {route.tela === 'programa'   && <ProgramaScreen/>}
      </AppShell>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
