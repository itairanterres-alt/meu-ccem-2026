document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

STATE = {\n  version: 1,\n  createdAt: null,\n  captures: [],   // [{id, day, time, sessionRef, type, title, body, tags, ts}]\n  marks: {},      // { sessionId: true }\n  chat: []        // [{role:'user'|'ai', kind, ts, content...}]\n};\n\nfunction loadState(){\n  // TODO: integrar com API real (GET /caderno/:userId) — fallback localStorage offline.\n  try{\n    const raw = localStorage.getItem(STATE_KEY);\n    if(!raw) return seedInitial();\n    const parsed = JSON.parse(raw);\n    return Object.assign({}, DEFAULT_STATE, parsed);\n  } catch(e){\n    return seedInitial();\n  }\n}\nfunction saveState(){\n  // TODO: integrar com API real (POST /caderno/:userId) — manter localStorage como cache offline.\n  try{\n    localStorage.setItem(STATE_KEY, JSON.stringify(state));\n  } catch(e){ console.warn('storage falhou', e); }\n}\nfunction seedInitial(){\n  // semente plausível para a comissão ver algo funcional na primeira abertura.\n  // Em produção: estado começa vazio.\n  const s = JSON.parse(JSON.stringify(DEFAULT_STATE));\n  s.createdAt = Date.now();\n  s.marks = { 'sex-simp1': true, 'sex-simp3': true, 'sex-simp5': true, 'sab-mini-ia': true };\n  s.captures = [\n    {id:'c1', day:'sexta', time:'9:42', sessionRef:'Simpósio 1 · Dra. Luciana Pechmann', type:'foto',\n     title:'Triagonistas (retatrutida) — perda de peso superior a 24%',\n     body:'Próximo passo após GLP-1/GIP. <strong>Ref:<\u002Fstrong> <span class=\"cite\">Jastreboff AM et al., NEJM 2023;389:514–526<\u002Fspan>. <em>Sem horizonte SUS no Brasil.<\u002Fem>',\n     tags:['DM2','incretinas','obesidade'], ts: Date.now()-86400000*1.2},\n    {id:'c2', day:'sexta', time:'9:55', sessionRef:'Simpósio 1 · Dra. Luciana Pechmann', type:'audio',\n     title:'Custo e acesso da próxima geração de incretinas',\n     body:'<strong>Take-home:<\u002Fstrong> remissão metabólica é o novo alvo, mas o gargalo no Brasil é distribuição via SUS. Tensão direta com a fala \"Clássicos\" do Dr. Luiz Antonio.',\n     tags:[], ts: Date.now()-86400000*1.18},\n    {id:'c3', day:'sexta', time:'13:50', sessionRef:'Simpósio 3 · Dra. Marta Duval', type:'audio',\n     title:'Estratificação de risco no CDT — o que mudou',\n     body:'<strong>Take-home:<\u002Fstrong> resposta excelente, indeterminada, bioquímica incompleta, estrutural incompleta — categorias <strong>dinâmicas<\u002Fstrong>, reavaliáveis no seguimento.',\n     tags:['tireoide','CDT','ATA'], ts: Date.now()-86400000*1.0},\n    {id:'c4', day:'sexta', time:'17:35', sessionRef:'Simpósio 5 · Dr. Itairan Terres ★', type:'texto',\n     title:'\"Centenas de exames e zero hipótese\" — anotações da sua fala',\n     body:'Frase a guardar: <em>\"o exame não substitui a hipótese — confirma ou refuta uma.\"<\u002Fem> Conexão com hiperdiagnóstico em endo (incidentaloma adrenal, nódulo tireoide).',\n     tags:['sua-fala','raciocínio-clínico'], ts: Date.now()-86400000*0.9},\n    {id:'c5', day:'sabado', time:'8:30', sessionRef:'Simpósio 6 · Dr. Alexandre Hohl', type:'foto',\n     title:'Nova diretriz de hipogonadismo — pontos de mudança',\n     body:'<strong>Cutoff de testosterona total<\u002Fstrong> ajustado por idade. Tratamento iniciado apenas com <strong>duas<\u002Fstrong> dosagens matinais alteradas.',\n     tags:['gônadas','diretriz'], ts: Date.now()-86400000*0.5},\n    {id:'c6', day:'sabado', time:'16:30', sessionRef:'Simpósio 10 · Dra. Cristina Schreiber', type:'foto',\n     title:'Manutenção pós-emagrecimento — 4 estratégias farmacológicas',\n     body:'Manter incretina em dose menor · GLP-1 oral · associação com bupropiona/naltrexona · ciclo de pausa programada. <strong>Caveat:<\u002Fstrong> sem ECR direto.',\n     tags:['obesidade','manutenção'], ts: Date.now()-86400000*0.2},\n    {id:'c7', day:'sabado', time:'17:05', sessionRef:'Mini · Dra. Milena Gurgel ★', type:'texto',\n     title:'IA no consultório — o que vale e o que não vale',\n     body:'<strong>Útil:<\u002Fstrong> resumo de evolução, geração de pedidos, cruzamento com diretrizes. <strong>Não substitui:<\u002Fstrong> hipótese diagnóstica, decisão clínica, vínculo com paciente.',\n     tags:['IA','tema-chave','ressoa-com-fala'], ts: Date.now()-86400000*0.1}\n  ];\n  s.chat = [];\n  return s;\n}\n\nconst state = loadState();\nsaveState(); // garante presença\n\n/* ---------- contexto da sessão atual (mockado) ---------- */\n// TODO: integrar com horário real do dispositivo + grade do congresso.\nconst CURRENT_SESSION = {\n  day: 'sexta',\n  ref: 'Simpósio 1 — DM2 em 3 atos',\n  moderator: 'Dr. Paulo de Tarso Freitas',\n  speakers: ['Dr. Luiz Antonio (Clássicos)', 'Dra. Adriana Striebel (Contemporâneos)', 'Dra. Luciana Pechmann (Promessas)'],\n  startedAt: '8:45'\n};\n\n/* ---------- navegação ---------- */\nfunction switchPanel(name, btn){\n  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));\n  document.getElementById('panel-'+name).classList.add('active');\n  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));\n  btn.classList.add('active');\n  if(name === 'caderno') renderCaderno();\n  if(name === 'assistente') setTimeout(()=>{\n    const w = document.getElementById('chatWrap');\n    if(w) w.scrollTop = w.scrollHeight;\n  }, 30);\n}\nfunction switchDay(day, btn){\n  document.getElementById('day-sexta').style.display = day === 'sexta' ? 'block' : 'none';\n  document.getElementById('day-sabado').style.display = day === 'sabado' ? 'block' : 'none';\n  document.querySelectorAll('.day-toggle button').forEach(b=>b.classList.remove('active'));\n  btn.classList.add('active');\n  const summary = document.getElementById('daySummary');\n  const marks = Object.values(state.marks).filter(Boolean).length;\n  if(day === 'sexta'){\n    summary.innerHTML = '<span><strong>10<\u002Fstrong> sessões<\u002Fspan><span><strong>'+marks+'<\u002Fstrong> marcadas<\u002Fspan><span><strong>1<\u002Fstrong> sua fala <span style=\"color:var(--gold)\">★<\u002Fspan><\u002Fspan>';\n  } else {\n    summary.innerHTML = '<span><strong>9<\u002Fstrong> sessões<\u002Fspan><span><strong>'+marks+'<\u002Fstrong> marcadas<\u002Fspan><span><strong>1<\u002Fstrong> tema-chave <span style=\"color:var(--gold)\">★<\u002Fspan><\u002Fspan>';\n  }\n}\n\n/* ---------- programa: capturar e marcar interesse ---------- */\nfunction capture(btn, label){\n  // cria captura \"esqueleto\" e leva ao Assistente, contexto = essa sessão.\n  const day = btn.closest('#day-sabado') ? 'sabado' : 'sexta';\n  const time = btn.closest('.session').querySelector('.time-start').textContent.trim();\n  const cap = {\n    id: 'c_' + Date.now().toString(36),\n    day, time,\n    sessionRef: label,\n    type: 'texto',\n    title: 'Captura iniciada — ' + label,\n    body: '<em>Toque o microfone, mande foto do slide, ou escreva uma observação no Assistente. Vou organizar aqui.<\u002Fem>',\n    tags: [],\n    ts: Date.now()\n  };\n  state.captures.unshift(cap);\n  saveState();\n  showToast('Captura aberta · ' + label.split('·')[0].trim());\n  // troca para Assistente\n  const assistBtn = document.querySelectorAll('nav.tabs button')[1];\n  switchPanel('assistente', assistBtn);\n  // mensagem de IA contextualizada\n  pushAI({\n    tag: 'Sessão em foco',\n    html: 'Pronto. Estamos em <strong>' + label + '<\u002Fstrong>. Mande foto do slide, grave um trecho ou anote livre — vai pro caderno desta sessão.',\n    actions: [{label:'Take-home', kind:'takehome'}, {label:'Resumir', kind:'resume'}]\n  });\n}\nfunction markInterest(btn){\n  const sessionEl = btn.closest('.session');\n  const sid = sessionEl.dataset.sessionId || ('s_' + (sessionEl.querySelector('.session-title').textContent.trim().slice(0,20)));\n  sessionEl.dataset.sessionId = sid;\n  const isMarked = btn.classList.contains('marked');\n  if(isMarked){\n    delete state.marks[sid];\n    btn.classList.remove('marked');\n    btn.innerHTML = '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"/><\u002Fsvg>Interesse';\n  } else {\n    state.marks[sid] = true;\n    btn.classList.add('marked');\n    btn.innerHTML = '<svg viewBox=\"0 0 24 24\" fill=\"currentColor\" stroke=\"none\"><path d=\"M12 2l2.4 7.4H22l-6 4.5 2.3 7.4L12 17l-6.3 4.3L8 13.9 2 9.4h7.6z\"/><\u002Fsvg>Marcado';\n    showToast('Marcada como interesse');\n  }\n  saveState();\n}\n\n/* ---------- caderno: render ---------- */\nlet activeFilter = 'all';\nfunction renderCaderno(){\n  const container = document.getElementById('notesContainer');\n  const empty = document.getElementById('cadernoEmpty');\n  const items = state.captures.slice().sort((a,b)=>b.ts - a.ts);\n\n  // contadores\n  document.getElementById('countAll').textContent = items.length;\n  document.getElementById('countFoto').textContent = items.filter(c=>c.type==='foto').length;\n  document.getElementById('countAudio').textContent = items.filter(c=>c.type==='audio').length;\n  document.getElementById('countTexto').textContent = items.filter(c=>c.type==='texto').length;\n\n  // stats\n  document.getElementById('statCaptures').textContent = items.length;\n  document.getElementById('statSessions').textContent = new Set(items.map(c=>c.sessionRef)).size;\n  document.getElementById('statRefs').textContent = items.reduce((acc,c)=>acc + (c.body.match(/\\bref\\b|NEJM|JCEM|Lancet|Diabetes|guideline|diretriz/gi)||[]).length, 0);\n\n  const filtered = activeFilter === 'all' ? items : items.filter(c=>c.type===activeFilter);\n\n  if(filtered.length === 0){\n    container.innerHTML = '';\n    empty.style.display = 'block';\n    return;\n  }\n  empty.style.display = 'none';\n\n  // agrupa por dia\n  const sex = filtered.filter(c=>c.day==='sexta');\n  const sab = filtered.filter(c=>c.day==='sabado');\n\n  let html = '';\n  if(sex.length){\n    html += sectionHTML('Sexta · 23 outubro', sex);\n  }\n  if(sab.length){\n    html += sectionHTML('Sábado · 24 outubro', sab);\n  }\n  container.innerHTML = html;\n}\nfunction sectionHTML(title, list){\n  let h = '<div class=\"caderno-section\"><h3>' + title +\n    ' <span class=\"h3-meta\">' + list.length + ' ' + (list.length===1?'captura':'capturas') + '<\u002Fspan><\u002Fh3>';\n  list.forEach(c => h += noteCardHTML(c));\n  h += '<\u002Fdiv>';\n  return h;\n}\nfunction noteCardHTML(c){\n  const icons = {\n    foto: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><rect x=\"3\" y=\"6\" width=\"18\" height=\"13\" rx=\"2\"/><circle cx=\"12\" cy=\"12.5\" r=\"3\"/><\u002Fsvg>',\n    audio: '<svg viewBox=\"0 0 24 24\" fill=\"currentColor\" stroke=\"none\"><rect x=\"9\" y=\"4\" width=\"6\" height=\"12\" rx=\"3\"/><\u002Fsvg>',\n    texto: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M4 6h16M4 12h16M4 18h10\"/><\u002Fsvg>'\n  };\n  const labels = { foto:'Foto', audio:'Áudio', texto:'Texto' };\n  const tags = (c.tags||[]).map(t=>'<span class=\"note-tag\">'+escapeHTML(t)+'<\u002Fspan>').join('');\n  return '<div class=\"note-card '+c.type+'\" data-type=\"'+c.type+'\" data-id=\"'+c.id+'\">' +\n    '<div class=\"note-meta\">' +\n      '<span class=\"session-ref\">'+ escapeHTML(c.sessionRef) +' · '+ escapeHTML(c.time) +'<\u002Fspan>' +\n      '<span class=\"type-tag t-'+c.type+'\">'+icons[c.type]+labels[c.type]+'<\u002Fspan>' +\n    '<\u002Fdiv>' +\n    '<div class=\"note-title\">'+ escapeHTML(c.title) +'<\u002Fdiv>' +\n    '<div class=\"note-body\">'+ c.body +'<\u002Fdiv>' +\n    (tags? '<div class=\"note-tags\">'+tags+'<\u002Fdiv>' : '') +\n  '<\u002Fdiv>';\n}\nfunction escapeHTML(s){ return String(s).replace(/[&<>\"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'})[m]); }\n\ndocument.getElementById('filterRow').addEventListener('click', e=>{\n  const btn = e.target.closest('.filter-chip');\n  if(!btn) return;\n  document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));\n  btn.classList.add('active');\n  activeFilter = btn.dataset.filter;\n  renderCaderno();\n});\n\n/* ---------- toast ---------- */\nlet toastTimer;\nfunction showToast(text){\n  const t = document.getElementById('toast');\n  document.getElementById('toastText').textContent = text;\n  t.classList.add('show');\n  clearTimeout(toastTimer);\n  toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);\n}\n\n/* ---------- export PDF ---------- */\nfunction exportPDF(){\n  // TODO: integrar com gerador real (server-side ou jsPDF) — enviar state.captures.\n  showToast('PDF gerado · ' + state.captures.length + ' capturas');\n}\n\n/* ---------- reset ---------- */\nfunction resetState(){\n  if(!confirm('Limpar caderno, marcações e conversas deste dispositivo?')) return;\n  localStorage.removeItem(STATE_KEY);\n  localStorage.removeItem(USER_KEY);\n  location.reload();\n}\n\n/* ============================================================\n   ASSISTENTE — chat funcional com mock de IA\n   TODO: trocar getMockReply() por chamada à API real.\n   Padrão sugerido: Gemini 2.0 Flash, com roteamento para Claude\n   Sonnet em pedidos complexos (comparação, take-home, síntese).\n   ============================================================ */\n\nfunction nowStamp(){\n  const d = new Date();\n  return d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');\n}\n\nfunction pushUser(html){\n  state.chat.push({role:'user', html, ts: Date.now()});\n  saveState();\n  appendBubble('user', html, nowStamp());\n}\nfunction pushAI(payload){\n  state.chat.push({role:'ai', payload, ts: Date.now()});\n  saveState();\n  appendBubble('ai', renderAI(payload), nowStamp());\n}\n\nfunction appendBubble(role, html, stamp){\n  const wrap = document.getElementById('chatWrap');\n  if(role === 'user'){\n    wrap.insertAdjacentHTML('beforeend',\n      '<div class=\"msg-group user\"><div class=\"msg user\">'+html+'<\u002Fdiv><div class=\"msg-stamp\">'+stamp+'<\u002Fdiv><\u002Fdiv>');\n  } else {\n    wrap.insertAdjacentHTML('beforeend',\n      '<div class=\"msg-group ai\"><div class=\"msg ai\">'+html+'<\u002Fdiv><div class=\"msg-stamp\">'+stamp+'<\u002Fdiv><\u002Fdiv>');\n  }\n  wrap.scrollTop = wrap.scrollHeight;\n}\n\nfunction renderAI(p){\n  let h = '';\n  if(p.tag) h += '<div class=\"ai-tag\">'+escapeHTML(p.tag)+'<\u002Fdiv>';\n  h += p.html || '';\n  if(p.ref) h += '<div class=\"ref-row\"><span class=\"ref-lbl\">Referência citada<\u002Fspan>'+p.ref+'<\u002Fdiv>';\n  if(p.actions && p.actions.length){\n    h += '<div class=\"ai-actions\">';\n    p.actions.forEach(a => {\n      h += '<button data-kind=\"'+escapeHTML(a.kind)+'\">'+escapeHTML(a.label)+'<\u002Fbutton>';\n    });\n    h += '<\u002Fdiv>';\n  }\n  return h;\n}\n\nfunction showTyping(){\n  const wrap = document.getElementById('chatWrap');\n  const t = document.createElement('div');\n  t.className = 'typing'; t.id = 'typingNow';\n  t.innerHTML = '<span><\u002Fspan><span><\u002Fspan><span><\u002Fspan>';\n  wrap.appendChild(t); wrap.scrollTop = wrap.scrollHeight;\n}\nfunction hideTyping(){\n  const t = document.getElementById('typingNow');\n  if(t) t.remove();\n}\n\n/* ----- mocks de resposta da IA ----- */\n// TODO: integrar com API real (Gemini 2.0 Flash padrão; Claude Sonnet em comparação/síntese).\nconst MOCK_REPLIES = {\n  // categoria: ['photo' | 'audio' | 'compare' | 'takehome' | 'free']\n  photo: [\n    {tag:'Slide identificado', html:'Esse slide é da fala em curso (<strong>'+'{speaker}'+'<\u002Fstrong>). <br><br><strong>Mensagem-chave:<\u002Fstrong> a tabela mostra redução de A1c sustentada em 72 semanas com tirzepatida 15mg vs. semaglutida 1mg — diferença absoluta ~0,5%.', ref:'Frías JP et al. <em class=\"cite\">NEJM 2021;385:503–515<\u002Fem>',\n     actions:[{label:'Salvar no caderno', kind:'save'}, {label:'Take-home', kind:'takehome'}]},\n    {tag:'Slide identificado', html:'Slide do bloco \"{speaker}\". <br><br><strong>Ponto central:<\u002Fstrong> três categorias dinâmicas de resposta no seguimento do CDT — não são rótulos fixos, são reavaliáveis.', ref:'ATA Guidelines <em class=\"cite\">Thyroid 2024 update<\u002Fem>',\n     actions:[{label:'Salvar no caderno', kind:'save'}, {label:'Comparar com outra fala', kind:'compare'}]}\n  ],\n  audio: [\n    {tag:'Áudio transcrito · trecho', html:'<em>\"...o que mudou não é a molécula, é o alvo. A gente não fala mais em controle, fala em remissão metabólica...\"<\u002Fem><br><br><strong>Take-home:<\u002Fstrong> mudança de paradigma terapêutico — controle → remissão.',\n     actions:[{label:'Salvar take-home', kind:'save'}, {label:'Ver transcrição completa', kind:'transcript'}]}\n  ],\n  takehome: [\n    {tag:'Take-home da sessão', html:'Três pontos para levar:<br><br>1. <strong>Metformina<\u002Fstrong> segue como base — eficácia, segurança, custo.<br>2. <strong>Incretinas duplas<\u002Fstrong> consolidadas (tirzepatida); triagonistas em fase 3.<br>3. <strong>Acesso<\u002Fstrong> via SUS é o gargalo brasileiro — sem horizonte definido.',\n     actions:[{label:'Salvar no caderno', kind:'save'}]}\n  ],\n  compare: [\n    {tag:'Comparação · mesma mesa', html:'Dois ângulos:<br><br><strong>Clássicos<\u002Fstrong> (Dr. Luiz Antonio): metformina + insulina seguem essenciais; medicina baseada em acesso.<br><br><strong>Promessas<\u002Fstrong> (Dra. Luciana): redefinir alvo terapêutico — remissão > controle.<br><br><em>Ponto de atrito:<\u002Fem> custo e horizonte SUS.',\n     actions:[{label:'Salvar comparação', kind:'save'}]}\n  ],\n  resume: [\n    {tag:'Resumo da sessão', html:'<strong>Simpósio 1 — DM2 em 3 atos<\u002Fstrong> · 8:45–10:00<br><br>Três falas em diálogo: <strong>Clássicos<\u002Fstrong> defende metformina/insulina como espinha dorsal; <strong>Contemporâneos<\u002Fstrong> mapeia o consenso atual com GLP-1/GIP; <strong>Promessas<\u002Fstrong> projeta triagonistas (retatrutida) e remissão metabólica como novo alvo.',\n     actions:[{label:'Salvar resumo', kind:'save'}, {label:'Take-home', kind:'takehome'}]}\n  ],\n  free: [\n    {tag:'Anotado', html:'Adicionei ao caderno na sessão atual ({sessionRef}). Quer que eu sugira tags?', actions:[{label:'Sugerir tags', kind:'tags'}, {label:'Ver no caderno', kind:'goto-caderno'}]},\n    {tag:'Anotado', html:'Salvei a observação. Posso cruzar com a fala anterior dessa mesa?', actions:[{label:'Cruzar com fala anterior', kind:'compare'}, {label:'Só salvar', kind:'save'}]}\n  ]\n};\n\nfunction getMockReply(intent, ctx){\n  // TODO: integrar com API real. Hoje: seleciona um mock plausível por intenção.\n  const list = MOCK_REPLIES[intent] || MOCK_REPLIES.free;\n  const pick = list[Math.floor(Math.random()*list.length)];\n  // interpola placeholders\n  const out = JSON.parse(JSON.stringify(pick));\n  const speaker = ctx?.speaker || (CURRENT_SESSION.speakers[Math.floor(Math.random()*CURRENT_SESSION.speakers.length)]);\n  out.html = (out.html||'').replace(/\\{speaker\\}/g, speaker).replace(/\\{sessionRef\\}/g, CURRENT_SESSION.ref);\n  return out;\n}\n\nfunction classifyIntent(text){\n  const t = text.toLowerCase();\n  if(/comparar|compare|diferen[cç]a|versus|vs\\b/.test(t)) return 'compare';\n  if(/take.?home|levar|conclus[aã]o/.test(t)) return 'takehome';\n  if(/resum[oi]r?|s[ií]ntese|sumariz/.test(t)) return 'resume';\n  return 'free';\n}\n\n/* ----- envios ----- */\nfunction sendMsg(){\n  const input = document.getElementById('msgInput');\n  const v = input.value.trim();\n  if(!v) return;\n  input.value = '';\n  pushUser(escapeHTML(v));\n  showTyping();\n  const intent = classifyIntent(v);\n  const latency = 900 + Math.random()*700;\n  setTimeout(()=>{\n    hideTyping();\n    pushAI(getMockReply(intent));\n  }, latency);\n}\n\n/* ---------- captura de foto (câmera real) ---------- */\nfunction handlePhotoFile(file){\n  if(!file) return;\n  const reader = new FileReader();\n  reader.onload = ev => {\n    const dataUrl = ev.target.result;\n    const photoHTML = '<div class=\"photo-real\"><img src=\"'+dataUrl+'\" alt=\"slide\"><\u002Fdiv>';\n    pushUser(photoHTML);\n    // TODO: enviar para API real — POST imagem (dataUrl ou Blob) para análise via Gemini Vision / Claude.\n    // Hoje: mock após 1,4s simulando latência da análise.\n    showTyping();\n    setTimeout(()=>{ hideTyping(); pushAI(getMockReply('photo')); }, 1400);\n  };\n  reader.onerror = () => {\n    pushAI({tag:'Erro', html:'Não foi possível ler a imagem. Tente outra foto.'});\n  };\n  reader.readAsDataURL(file);\n}\n\ndocument.getElementById('photoInput').addEventListener('change', e=>{\n  const f = e.target.files && e.target.files[0];\n  handlePhotoFile(f);\n  e.target.value = ''; // permite re-selecionar a mesma foto\n});\n\ndocument.getElementById('btnPhoto').addEventListener('click', ()=>{\n  try{\n    document.getElementById('photoInput').click();\n  } catch(err){\n    pushAI({tag:'Erro', html:'Não foi possível acessar a câmera. Verifique as permissões do navegador.'});\n  }\n});\n\n/* ---------- captura de áudio (MediaRecorder real) ---------- */\nlet mediaRecorder = null;\nlet recordedChunks = [];\nlet recordingStream = null;\nlet recordingStart = 0;\nlet recordingTimer = null;\n\nfunction fmtTime(secs){\n  const m = Math.floor(secs/60), s = secs%60;\n  return m+':'+String(s).padStart(2,'0');\n}\n\nasync function startRecording(){\n  if(mediaRecorder && mediaRecorder.state === 'recording') return;\n  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){\n    pushAI({tag:'Erro', html:'Seu navegador não suporta gravação de áudio. Tente em Chrome ou Safari atualizados.'});\n    return;\n  }\n  try{\n    recordingStream = await navigator.mediaDevices.getUserMedia({audio:true});\n  } catch(err){\n    pushAI({tag:'Erro', html:'Não foi possível acessar o microfone. Verifique se autorizou o acesso e tente novamente.'});\n    return;\n  }\n  recordedChunks = [];\n  try{\n    mediaRecorder = new MediaRecorder(recordingStream);\n  } catch(err){\n    pushAI({tag:'Erro', html:'Não foi possível iniciar a gravação neste dispositivo.'});\n    stopStream(); return;\n  }\n  mediaRecorder.ondataavailable = e => { if(e.data && e.data.size>0) recordedChunks.push(e.data); };\n  mediaRecorder.onstop = finalizeRecording;\n  mediaRecorder.start();\n  recordingStart = Date.now();\n  document.getElementById('btnMic').classList.add('recording');\n  const bar = document.getElementById('recordingBar');\n  bar.classList.add('show');\n  const timeEl = document.getElementById('recTime');\n  timeEl.textContent = '0:00';\n  recordingTimer = setInterval(()=>{\n    const elapsed = Math.floor((Date.now()-recordingStart)/1000);\n    timeEl.textContent = fmtTime(elapsed);\n    if(elapsed >= 600){ stopRecording(); } // limite de 10min\n  }, 250);\n}\n\nfunction stopRecording(){\n  if(mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();\n}\nfunction cancelRecording(){\n  if(mediaRecorder && mediaRecorder.state === 'recording'){\n    mediaRecorder._cancelled = true;\n    mediaRecorder.stop();\n  }\n}\nfunction stopStream(){\n  if(recordingStream){\n    recordingStream.getTracks().forEach(t=>t.stop());\n    recordingStream = null;\n  }\n}\nfunction finalizeRecording(){\n  clearInterval(recordingTimer); recordingTimer = null;\n  document.getElementById('btnMic').classList.remove('recording');\n  document.getElementById('recordingBar').classList.remove('show');\n  const cancelled = mediaRecorder && mediaRecorder._cancelled;\n  const dur = Math.max(1, Math.floor((Date.now()-recordingStart)/1000));\n  stopStream();\n  if(cancelled || recordedChunks.length === 0){ mediaRecorder = null; return; }\n\n  const mime = (mediaRecorder && mediaRecorder.mimeType) || 'audio/webm';\n  const blob = new Blob(recordedChunks, {type: mime});\n  const url = URL.createObjectURL(blob);\n  const id = 'au_' + Date.now().toString(36);\n  const wave = Array.from({length:18}, ()=>'<span style=\"height:'+(30+Math.random()*60)+'%\"><\u002Fspan>').join('');\n  const audioHTML =\n    '<div class=\"audio-stub\" data-audio-id=\"'+id+'\">' +\n      '<div class=\"play-btn\" data-action=\"play\"><svg viewBox=\"0 0 24 24\"><path d=\"M8 5v14l11-7z\"/><\u002Fsvg><\u002Fdiv>' +\n      '<div class=\"wave\">'+wave+'<\u002Fdiv>' +\n      '<div class=\"dur\">'+fmtTime(dur)+'<\u002Fdiv>' +\n      '<audio src=\"'+url+'\" preload=\"metadata\" data-dur=\"'+dur+'\"><\u002Faudio>' +\n    '<\u002Fdiv>';\n  pushUser(audioHTML);\n  mediaRecorder = null;\n\n  // TODO: enviar para API real — POST do Blob de áudio para transcrição (Whisper / Gemini)\n  // e análise pela IA. Hoje: mock após 1,7s.\n  showTyping();\n  setTimeout(()=>{ hideTyping(); pushAI(getMockReply('audio')); }, 1700);\n}\n\ndocument.getElementById('btnMic').addEventListener('click', ()=>{\n  if(mediaRecorder && mediaRecorder.state === 'recording') stopRecording();\n  else startRecording();\n});\ndocument.getElementById('recStop').addEventListener('click', stopRecording);\ndocument.getElementById('recCancel').addEventListener('click', cancelRecording);\n\n/* ---------- play de áudios reais (delegação) ---------- */\ndocument.getElementById('chatWrap').addEventListener('click', e=>{\n  const playBtn = e.target.closest('.audio-stub [data-action=\"play\"]');\n  if(!playBtn) return;\n  const stub = playBtn.closest('.audio-stub');\n  const audio = stub.querySelector('audio');\n  if(!audio) return;\n  // pausa qualquer outro tocando\n  document.querySelectorAll('.audio-stub.playing').forEach(s=>{\n    if(s!==stub){ s.classList.remove('playing'); const a=s.querySelector('audio'); if(a){a.pause(); a.currentTime=0;} setPlayIcon(s, true); }\n  });\n  if(audio.paused){\n    audio.play().catch(()=>{});\n    stub.classList.add('playing');\n    setPlayIcon(stub, false);\n    audio.onended = ()=>{ stub.classList.remove('playing'); setPlayIcon(stub, true); };\n  } else {\n    audio.pause();\n    stub.classList.remove('playing');\n    setPlayIcon(stub, true);\n  }\n});\nfunction setPlayIcon(stub, isPlay){\n  const btn = stub.querySelector('[data-action=\"play\"]');\n  if(!btn) return;\n  btn.innerHTML = isPlay\n    ? '<svg viewBox=\"0 0 24 24\"><path d=\"M8 5v14l11-7z\"/><\u002Fsvg>'\n    : '<svg viewBox=\"0 0 24 24\"><rect x=\"6\" y=\"5\" width=\"4\" height=\"14\"/><rect x=\"14\" y=\"5\" width=\"4\" height=\"14\"/><\u002Fsvg>';\n}\n\n/* ----- ações inline da IA ----- */\ndocument.getElementById('chatWrap').addEventListener('click', e=>{\n  const btn = e.target.closest('.ai-actions button');\n  if(!btn) return;\n  const kind = btn.dataset.kind;\n  if(kind === 'save'){\n    // salva o último conteúdo da IA como captura no caderno\n    const text = btn.closest('.msg.ai').innerHTML;\n    const cap = {\n      id: 'c_' + Date.now().toString(36),\n      day: CURRENT_SESSION.day, time: nowStamp(),\n      sessionRef: CURRENT_SESSION.ref,\n      type: 'texto',\n      title: 'Anotação salva via assistente',\n      body: text.replace(/<div class=\"ai-actions\">[\\s\\S]*?<\\/div>/, '').replace(/<div class=\"ai-tag\">[\\s\\S]*?<\\/div>/, ''),\n      tags: ['assistente'],\n      ts: Date.now()\n    };\n    state.captures.unshift(cap); saveState();\n    btn.classList.add('saved');\n    btn.innerHTML = '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\"><path d=\"M20 6L9 17l-5-5\"/><\u002Fsvg>Salvo';\n    showToast('Salvo no caderno');\n  } else if(kind === 'takehome'){\n    showTyping();\n    setTimeout(()=>{ hideTyping(); pushAI(getMockReply('takehome')); }, 900);\n  } else if(kind === 'compare'){\n    showTyping();\n    setTimeout(()=>{ hideTyping(); pushAI(getMockReply('compare')); }, 900);\n  } else if(kind === 'resume'){\n    showTyping();\n    setTimeout(()=>{ hideTyping(); pushAI(getMockReply('resume')); }, 900);\n  } else if(kind === 'goto-caderno'){\n    switchPanel('caderno', document.querySelectorAll('nav.tabs button')[2]);\n  } else if(kind === 'tags'){\n    pushAI({tag:'Tags sugeridas', html:'Com base no contexto: <span class=\"note-tag\" style=\"margin-right:4px\">DM2<\u002Fspan> <span class=\"note-tag\" style=\"margin-right:4px\">incretinas<\u002Fspan> <span class=\"note-tag\">'+CURRENT_SESSION.day+'<\u002Fspan>'});\n  } else if(kind === 'transcript'){\n    pushAI({tag:'Transcrição', html:'<em>(transcrição completa do trecho de áudio aparece aqui — recurso em desenvolvimento)<\u002Fem>'});\n  }\n});\n\n/* ---------- bootstrap ---------- */\nfunction restoreSessionMarks(){\n  document.querySelectorAll('.session').forEach(s=>{\n    const t = s.querySelector('.session-title');\n    if(!t) return;\n    const sid = 's_' + t.textContent.trim().slice(0,20);\n    s.dataset.sessionId = sid;\n    if(state.marks[sid]){\n      const btn = s.querySelector('.action-btn:not(.primary)');\n      if(btn && !btn.classList.contains('marked')){\n        btn.classList.add('marked');\n        btn.innerHTML = '<svg viewBox=\"0 0 24 24\" fill=\"currentColor\" stroke=\"none\"><path d=\"M12 2l2.4 7.4H22l-6 4.5 2.3 7.4L12 17l-6.3 4.3L8 13.9 2 9.4h7.6z\"/><\u002Fsvg>Marcado';\n      }\n    }\n  });\n}\nfunction restoreChat(){\n  if(state.chat.length === 0) return; // mantém mensagens iniciais do HTML\n  // se há histórico salvo, esvazia o seed e renderiza histórico\n  document.getElementById('chatWrap').innerHTML = '<div class=\"day-divider\">conversa salva<\u002Fdiv>';\n  state.chat.forEach(m=>{\n    const stamp = new Date(m.ts);\n    const s = stamp.getHours()+':'+String(stamp.getMinutes()).padStart(2,'0');\n    if(m.role==='user') appendBubble('user', m.html, s);\n    else appendBubble('ai', renderAI(m.payload), s);\n  });\n}\n\ndocument.getElementById('msgInput').addEventListener('keydown', e=>{\n  if(e.key === 'Enter') sendMsg();\n});\n\n// quick chips\ndocument.querySelectorAll('.quick-chip').forEach(c=>{\n  c.addEventListener('click', ()=>{\n    const map = {'Resumir essa sessão':'resume','Ver minhas capturas de hoje':'goto','Próxima sessão de interesse':'next','Take-home da manhã':'takehome'};\n    const kind = map[c.textContent.trim()] || 'free';\n    if(kind === 'goto'){ switchPanel('caderno', document.querySelectorAll('nav.tabs button')[2]); return; }\n    pushUser(escapeHTML(c.textContent.trim()));\n    showTyping();\n    setTimeout(()=>{ hideTyping(); pushAI(getMockReply(kind === 'next' ? 'free' : kind)); }, 900);\n  });\n});\n\n// composer mídia: handlers reais são registrados acima (btnPhoto / btnMic)\n\n/* ---------- live strip: agora / em breve / próximo evento ---------- */\n// TODO: integrar com grade real do congresso vinda de API.\nconst PROGRAM_DAYS = [\n  // sexta 23/10/2026\n  { date: new Date(2026,9,23), sessions: [\n    {start:'08:30', end:'08:45', title:'Abertura do congresso'},\n    {start:'08:45', end:'10:00', title:'Simpósio 1 — DM2 em 3 atos'},\n    {start:'10:20', end:'11:30', title:'Simpósio 2 — Tireoide'},\n    {start:'13:30', end:'14:40', title:'Simpósio 3 — CDT seguimento'},\n    {start:'15:00', end:'16:10', title:'Simpósio 4 — Adrenal'},\n    {start:'16:30', end:'17:45', title:'Simpósio 5 — Raciocínio clínico'}\n  ]},\n  // sábado 24/10/2026\n  { date: new Date(2026,9,24), sessions: [\n    {start:'08:30', end:'09:40', title:'Simpósio 6 — Hipogonadismo'},\n    {start:'10:00', end:'11:10', title:'Simpósio 7 — Obesidade infantil'},\n    {start:'13:30', end:'14:40', title:'Simpósio 9 — Manutenção pós-emagrecimento'},\n    {start:'15:00', end:'16:10', title:'Simpósio 10 — Novas fronteiras'},\n    {start:'16:30', end:'17:30', title:'Mini — IA no consultório'}\n  ]}\n];\n\nfunction parseHM(d, hm){\n  const [h,m] = hm.split(':').map(Number);\n  const out = new Date(d); out.setHours(h, m, 0, 0); return out;\n}\nfunction fmtHM(d){ return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0'); }\n\nfunction computeLiveStatus(now){\n  // 1) durante uma sessão hoje?\n  for(const day of PROGRAM_DAYS){\n    if(day.date.toDateString() !== now.toDateString()) continue;\n    for(const s of day.sessions){\n      const st = parseHM(day.date, s.start), en = parseHM(day.date, s.end);\n      if(now >= st && now < en) return {kind:'live', tag:'Agora', text:s.title, time:fmtHM(now)};\n      if(now < st) return {kind:'soon', tag:'Em breve', text:s.title, time:s.start};\n    }\n  }\n  // 2) antes do congresso → primeiro evento\n  const firstDay = PROGRAM_DAYS[0];\n  if(now < parseHM(firstDay.date, firstDay.sessions[0].start)){\n    const first = firstDay.sessions[1] || firstDay.sessions[0]; // pula abertura, mostra Simpósio 1\n    const dateLabel = firstDay.date.toLocaleDateString('pt-BR', {day:'2-digit', month:'short'}).replace('.','');\n    return {kind:'upcoming', tag:'Próximo evento', text:first.title, time: dateLabel + ' · ' + first.start};\n  }\n  // 3) após o congresso → encerrado\n  return {kind:'past', tag:'Encerrado', text:'12º CCEM · 23–24 out 2026', time:''};\n}\n\nfunction renderLiveStrip(){\n  const now = new Date();\n  const st = computeLiveStatus(now);\n  document.getElementById('nowTag').textContent = st.tag;\n  document.getElementById('nowText').textContent = st.text;\n  document.getElementById('nowTime').textContent = st.time;\n  const dot = document.getElementById('liveDot');\n  const strip = document.getElementById('liveStrip');\n  // dot pulsa só quando \"Agora\"; em outros estados, vira marca estática\n  dot.style.animation = st.kind === 'live' ? '' : 'none';\n  dot.style.background = ({live:'var(--accent)', soon:'var(--gold)', upcoming:'var(--ink-mute)', past:'var(--line)'})[st.kind];\n  strip.dataset.state = st.kind;\n}\nrenderLiveStrip();\nsetInterval(renderLiveStrip, 30000); // re-checa a cada 30s\n\n\n\n// inicialização\nrestoreSessionMarks();\nrestoreChat();\nrenderCaderno();\n\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
