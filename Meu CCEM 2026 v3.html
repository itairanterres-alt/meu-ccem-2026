<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meu CCEM 2026</title>
  <meta name="theme-color" content="#1d3e8a"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    body { background: #06112e; }

    /* Stage — centra o device */
    .stage {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, #1d3e8a 0%, #040b1a 68%);
    }

    /* Device — frame do celular */
    .device {
      width: 390px; height: 844px;
      border-radius: 50px;
      background: #f3f6fc;
      overflow: hidden;
      border: 9px solid #070e28;
      box-shadow:
        0 0 0 1px #1a2f6e,
        inset 0 0 0 1px rgba(255,255,255,.06),
        0 40px 100px rgba(0,0,0,.75),
        0 0 60px rgba(29,62,138,.3);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Notch */
    .device::before {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #070e28;
      border-radius: 0 0 22px 22px;
      z-index: 10;
    }

    /* React root fills device */
    #root {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      padding-top: 34px; /* notch height */
    }

    /* Toast */
    .ccem-toast {
      position: absolute;
      bottom: 76px; left: 50%;
      transform: translateX(-50%) translateY(14px);
      background: #1a2438;
      color: #fff;
      padding: 9px 15px;
      border-radius: 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }
    .ccem-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Scrollbars */
    * { scrollbar-width: thin; scrollbar-color: #d5dff0 transparent; }
    *::-webkit-scrollbar { width: 3px; height: 3px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: #d5dff0; border-radius: 3px; }

    /* Keyframes */
    @keyframes ccem-pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(34,197,94,.2); }
      50%       { box-shadow: 0 0 0 5px rgba(34,197,94,.06); }
    }
    @keyframes ccem-bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-4px); }
    }

    /* Responsive — se viewport menor que device */
    @media (max-height: 870px) {
      .device { height: calc(100vh - 26px); border-radius: 36px; }
    }
    @media (max-width: 410px) {
      .device { width: 100vw; border-radius: 0; border-left: none; border-right: none; height: 100vh; }
      .device::before { display: none; }
      #root { padding-top: 0; }
    }
  </style>

  <!-- React 18 + Babel (versões fixadas) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div class="stage">
  <div class="device">
    <div id="root"></div>
    <div id="ccem-toast" class="ccem-toast">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>
      <span></span>
    </div>
  </div>
</div>

<!-- Dados do programa -->
<script src="ccem-data.js"></script>

<!-- Lib: ícones, hooks, storage -->
<script type="text/babel" src="ccem-lib.jsx"></script>

<!-- Telas -->
<script type="text/babel" src="ccem-screens.jsx"></script>

<!-- App Router -->
<script type="text/babel" data-presets="react">
  function App() {
    const hash = useHashRoute();

    const route = useMemo(() => {
      const parts = (hash || '#/').replace(/^#\/?/, '').split('/').filter(Boolean);
      if (parts[0] === 'sessao'     && parts[1]) return { tela:'sessao', id:parts[1] };
      if (parts[0] === 'assistente')             return { tela:'assistente' };
      if (parts[0] === 'caderno')                return { tela:'caderno' };
      if (parts[0] === 'info')                   return { tela:'info', section:parts[1]||'o-evento' };
      return { tela:'programa' };
    }, [hash]);

    const showShell = route.tela !== 'sessao';

    return (
      <AppShell showShell={showShell} aba={route.tela}>
        {route.tela === 'sessao'     && <SessaoDetail id={route.id}/>}
        {route.tela === 'assistente' && <AssistenteScreen/>}
        {route.tela === 'caderno'    && <CadernoScreen/>}
        {route.tela === 'info'       && <InfoScreen section={route.section}/>}
        {route.tela === 'programa'   && <ProgramaScreen/>}
      </AppShell>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
